<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Keyword Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Keyword Extractor</h1>
            <p>Upload a PDF document to extract the most relevant keywords using advanced NLP algorithms.</p>
        </header>

        <div class="main-content">
            <div class="left-panel">
                <div class="controls">
                    <div class="control-group">
                        <label for="method-select">Extraction Method:</label>
                        <select id="method-select">
                            <option value="tfidf">TF-IDF (Best for relevance)</option>
                            <option value="rake">RAKE (Best for phrases)</option>
                            <option value="freq">Word Frequency (Basic count)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="count-select">Number of Keywords:</label>
                        <select id="count-select">
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="30">30</option>
                        </select>
                    </div>
                </div>

                <div class="upload-area" id="drop-zone">
                    <div class="upload-icon">📄</div>
                    <h3>Drag & Drop your PDF here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
                
                <div id="file-info" class="hidden">
                    <span id="file-name"></span>
                    <button id="remove-file">✕</button>
                </div>

                <button id="extract-btn" class="primary-btn" disabled>Extract Keywords</button>
                
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p>Analyzing document...</p>
                </div>
                <div id="error-message" class="hidden error"></div>
            </div>

            <div class="right-panel">
                <h2>Results</h2>
                <div id="results-empty" class="empty-state">
                    <p>Upload a document and click extract to see results here.</p>
                </div>
                
                <div id="results-content" class="hidden">
                    <div class="actions">
                        <button id="copy-btn" class="secondary-btn">Copy to Clipboard</button>
                        <button id="csv-btn" class="secondary-btn">Download CSV</button>
                    </div>
                    
                    <div class="tabs">
                        <button class="tab active" data-target="chips-view">Keywords</button>
                        <button class="tab" data-target="chart-view">Chart</button>
                    </div>
                    
                    <div id="chips-view" class="view-content active">
                        <div id="keyword-chips" class="chips-container"></div>
                    </div>
                    
                    <div id="chart-view" class="view-content">
                        <canvas id="keyword-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
